<!DOCTYPE html>  <html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Manhwa List</title>  <link rel="manifest" href="manifest.json">  
<meta name="theme-color" content="#0f172a">  
  
  <style> 
.update-text {
  margin-top: 8px;
  font-size: 13px;
  color: #a5b4fc;
  opacity: 0.8;
}
    
body {  
  font-family: Arial;  
  background: radial-gradient(circle at top, #0f172a, #020617);  
  color: white;  
  margin: 0;  
}  
  
/* HEADER */  
.header {  
  text-align: center;  
  padding: 20px 10px 10px;  
}  
  
.logo {  
  width: 90%;  
  max-width: 400px;  
  
  /* ❌ hapus efek kotak */  
  border-radius: 0;  
  box-shadow: none;  
  
  display: block;  
  margin: 0 auto;  
}  
  
/* SEARCH */  
#search {  
  width: 90%;  
  margin: 15px auto;  
  display: block;  
  padding: 12px;  
  border-radius: 12px;  
  border: none;  
  background: rgba(255,255,255,0.05);  
  color: white;  
  outline: none;  
  
  box-shadow:  
    0 0 10px #00eaff,  
    inset 0 0 5px #00eaff;  
}  
  
/* LIST */  
.item {  
  background: rgba(255,255,255,0.05);  
  margin: 10px;  
  padding: 15px;  
  border-radius: 15px;  
  display: flex;  
  justify-content: space-between;  
  align-items: center;  
  
  backdrop-filter: blur(10px);  
  
  box-shadow:  
    0 0 10px rgba(0,255,255,0.2);  
  
  transition: 0.2s;  
}  
  
.item:hover {  
  transform: scale(1.02);  
  box-shadow:  
    0 0 15px #00eaff,  
    0 0 25px #ff00ff;  
}  
  
/* END */  
.end {  
  border: 1px solid #ff00ff;  
  box-shadow:  
    0 0 10px #ff00ff,  
    0 0 20px #ff00ff;  
}  
  
/* CONTROLS */  
.controls { display: none; }  
.edit .controls { display: inline; }  
  
button {  
  border: none;  
  background: none;  
  color: white;  
  font-size: 14px;  
}  
  
.delete {  
  color: #ff4d4d;  
  font-weight: bold;  
}  
  
/* FLOAT BUTTON */  
.fab {  
  position: fixed;  
  bottom: 20px;  
  right: 20px;  
  
  background: linear-gradient(135deg, #00eaff, #ff00ff);  
  color: white;  
  
  border-radius: 50%;  
  width: 60px;  
  height: 60px;  
  font-size: 24px;  
  
  box-shadow:  
    0 0 15px #00eaff,  
    0 0 25px #ff00ff;  
}  
  
/* MENU */  
.menu {  
  position: fixed;  
  bottom: 90px;  
  right: 20px;  
  display: none;  
}  
  
.menu button {  
  background: rgba(255,255,255,0.1);  
  padding: 10px;  
  border-radius: 10px;  
  margin-top: 5px;  
  color: white;  
}  
  
/* MODAL */  
.modal {  
  position: fixed;  
  top: 0;  
  left: 0;  
  width: 100%;  
  height: 100%;  
  background: rgba(0,0,0,0.7);  
  display: none;  
  justify-content: center;  
  align-items: center;  
}  
  
.modal-box {  
  background: #0f172a;  
  padding: 20px;  
  border-radius: 12px;  
  width: 80%;  
  box-shadow: 0 0 20px rgba(0,255,255,0.2);  
}  
  
.modal input, .modal textarea {  
  width: 100%;  
  padding: 10px;  
  margin: 10px 0;  
  border: none;  
  border-bottom: 1px solid #00eaff;  
  background: transparent;  
  color: white;  
}  
  
.modal-actions {  
  text-align: right;  
}  
  
.modal-actions button {  
  margin-left: 10px;  
  color: #00eaff;  
}  
</style>  </head>  <body>  <!-- HEADER -->  <div class="header">  
  <img src="logo.png" class="logo">  
</div>  <input id="search" placeholder="Search..." oninput="render()">  
<div id="list"></div>  <!-- MENU -->  <div class="menu" id="menu">  
  <button onclick="openModal()">➕ Tambah</button>  
  <button onclick="toggleEdit()">✏️ Edit</button>  
  <button onclick="exportData()">📤 Export</button>  
  <button onclick="openImport()">📥 Import</button>  
</div>  <button class="fab" onclick="toggleMenu()">☰</button>

<!-- MODAL TAMBAH -->  <div class="modal" id="modal">  
  <div class="modal-box">  
    <h3>Tambah Manhwa</h3>  
    <input id="titleInput" placeholder="Judul">  
    <input id="chInput" placeholder="Chapter" type="number">  <div class="modal-actions">  
  <button onclick="closeModal()">CANCEL</button>  
  <button onclick="add()">OK</button>  
</div>

  </div>  
</div>  <!-- MODAL IMPORT -->  <div class="modal" id="importModal">  
  <div class="modal-box">  
    <h3>Import Data</h3>  
    <textarea id="importText" placeholder="Paste data (optional)..."></textarea>  
    <input type="file" id="fileInput" accept=".json">  <div class="modal-actions">  
  <button onclick="closeImport()">CANCEL</button>  
  <button onclick="importData()">IMPORT</button>  
</div>

  </div>  
</div>  
  
<script>  
let data = JSON.parse(localStorage.getItem("manhwa")) || [];  
let editMode = false;
let openedIndex = null;

function getToday(){
  return new Date().toLocaleDateString("id-ID");
}  
  
function save(){  
  localStorage.setItem("manhwa", JSON.stringify(data));  
}  
  
function render(){
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";

  data.forEach((item,i)=>{
    if(!item.title.toLowerCase().includes(search)) return;

    let div = document.createElement("div");
    div.className = "item " + (editMode ? "edit": "") + (item.end ? " end":"");

    // klik expand
    div.onclick = () => {
      openedIndex = openedIndex === i ? null : i;
      render();
    };

    div.innerHTML = `
      <div>
        ${i+1}. ${item.title} ${
          item.end ? "(END)" : `(Ch.
          <span contenteditable="${editMode}" 
                oninput="editCh(${i}, this); event.stopPropagation();">
            ${item.ch}
          </span>)`
        }

        ${
          openedIndex === i
          ? `<div class="update-text">
               Last Update: ${item.lastUpdate || "-"}
             </div>`
          : ""
        }
      </div>

      <span class="controls">
        <button onclick="event.stopPropagation(); plus(${i})">+1</button>
        <button onclick="event.stopPropagation(); minus(${i})">-1</button>
        <button onclick="event.stopPropagation(); toggleEnd(${i})">END</button>
        <button class="delete" onclick="event.stopPropagation(); removeItem(${i})">X</button>
      </span>
    `;
    list.appendChild(div);
  });
}
  
function toggleMenu(){  
  let m = document.getElementById("menu");  
  m.style.display = m.style.display==="block"?"none":"block";  
}  
  
function toggleEdit(){  
  editMode = !editMode;  
  render();  
}  
  
function openModal(){ document.getElementById("modal").style.display="flex"; }  
function closeModal(){ document.getElementById("modal").style.display="none"; }  
  
function add(){  
  let title = titleInput.value;  
  let ch = chInput.value || 1;  
  if(!title) return;  
  
  data.push({
  title,
  ch: parseInt(ch),
  end:false,
  lastUpdate: getToday()
});  
  save();  
  render();  
  closeModal();  
  
  titleInput.value="";  
  chInput.value="";  
}  
  
function plus(i){
  data[i].ch++;
  data[i].lastUpdate = getToday();
  save(); render();
}

function minus(i){
  if(data[i].ch>0){
    data[i].ch--;
    data[i].lastUpdate = getToday();
  }
  save(); render();
}  
  
function editCh(i,el){
  let val = parseInt(el.innerText);
  if(!isNaN(val)){
    data[i].ch = val;
    data[i].lastUpdate = getToday();
    save();
  }
  
  function toggleEnd(i){
  data[i].end = !data[i].end;
  data[i].lastUpdate = getToday();
  save();
  render();
}
  
function removeItem(i){  
  if(confirm("Hapus manhwa ini?")){  
    data.splice(i,1);  
    save();  
    render();  
  }  
}  
  
/* EXPORT FILE */  
function exportData(){  
  let dataStr = JSON.stringify(data, null, 2);  
  let blob = new Blob([dataStr], {type: "application/json"});  
  let url = URL.createObjectURL(blob);  
  
  let a = document.createElement("a");  
  a.href = url;  
  a.download = "manhwa-backup.json";  
  a.click();  
  
  URL.revokeObjectURL(url);  
}  
  
/* IMPORT */  
function openImport(){ document.getElementById("importModal").style.display="flex"; }  
function closeImport(){ document.getElementById("importModal").style.display="none"; }  
  
function importData(){  
  let file = document.getElementById("fileInput").files[0];  
  
  if(file){  
    let reader = new FileReader();  
  
    reader.onload = function(e){  
      try{  
        let parsed = JSON.parse(e.target.result);  
        if(Array.isArray(parsed)){  
          data = parsed;  
          save();  
          render();  
          closeImport();  
          alert("Import berhasil!");  
        } else alert("Format salah!");  
      } catch {  
        alert("File tidak valid!");  
      }  
    };  
  
    reader.readAsText(file);  
  
  } else {  
    let text = document.getElementById("importText").value;  
  
    try{  
      let parsed = JSON.parse(text);  
      if(Array.isArray(parsed)){  
        data = parsed;  
        save();  
        render();  
        closeImport();  
        alert("Import berhasil!");  
      } else alert("Format salah!");  
    } catch {  
      alert("Data tidak valid!");  
    }  
  }  
}  
  
render();  
</script>  <script>  
if ('serviceWorker' in navigator) {  
  navigator.serviceWorker.register('./service-worker.js')  
    .then(() => console.log('Service Worker aktif'))  
    .catch(err => console.log('SW error:', err));  
}  
</script>  </body>  
</html>
