<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhwa List</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
.update-text {
  margin-top: 8px;
  font-size: 13px;
  color: #a5b4fc;
  opacity: 0.8;
}

body {
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  margin: 0;
}

.header { text-align: center; padding: 20px 10px 10px; }

.logo {
  width: 90%;
  max-width: 400px;
  display: block;
  margin: 0 auto;
}

#search {
  width: 90%;
  margin: 15px auto;
  display: block;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
  outline: none;
}

.item {
  background: rgba(255,255,255,0.05);
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls { display: none; }
.edit .controls { display: inline; }

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border-radius: 50%;
  width: 60px;
  height: 60px;
}

.menu {
  position: fixed;
  bottom: 90px;
  right: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
</div>

<input id="search" placeholder="Search..." oninput="render()">
<div id="list"></div>

<div class="menu" id="menu">
  <button onclick="openModal()">➕ Tambah</button>
  <button onclick="toggleEdit()">✏️ Edit</button>
</div>

<button class="fab" onclick="toggleMenu()">☰</button>

<div class="modal" id="modal">
  <div>
    <input id="titleInput" placeholder="Judul">
    <input id="chInput" type="number">
    <button onclick="add()">OK</button>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("manhwa")) || [];
let editMode = false;
let openedIndex = null;

function getToday(){
  return new Date().toLocaleDateString("id-ID");
}

function save(){
  localStorage.setItem("manhwa", JSON.stringify(data));
}

function render(){
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";

  data.forEach((item,i)=>{
    if(!item.title.toLowerCase().includes(search)) return;

    let div = document.createElement("div");
    div.className = "item " + (editMode ? "edit": "");

    div.onclick = () => {
      openedIndex = openedIndex === i ? null : i;
      render();
    };

    div.innerHTML = `
      <div>
        ${i+1}. ${item.title} (Ch.
        <span contenteditable="${editMode}" 
              oninput="editCh(${i}, this); event.stopPropagation();">
          ${item.ch}
        </span>)

        ${
          openedIndex === i
          ? `<div class="update-text">
               Last Update: ${item.lastUpdate || "-"}
             </div>`
          : ""
        }
      </div>

      <span class="controls">
        <button onclick="event.stopPropagation(); plus(${i})">+1</button>
        <button onclick="event.stopPropagation(); minus(${i})">-1</button>
      </span>
    `;
    list.appendChild(div);
  });
}

function toggleMenu(){
  let m = document.getElementById("menu");
  m.style.display = m.style.display==="block"?"none":"block";
}

function toggleEdit(){
  editMode = !editMode;
  render();
}

function openModal(){ modal.style.display="block"; }

function add(){
  let title = titleInput.value;
  let ch = chInput.value || 1;

  data.push({
    title,
    ch: parseInt(ch),
    lastUpdate: getToday()
  });

  save();
  render();
}

function plus(i){
  data[i].ch++;
  data[i].lastUpdate = getToday();
  save(); render();
}

function minus(i){
  data[i].ch--;
  data[i].lastUpdate = getToday();
  save(); render();
}

function editCh(i,el){
  let val = parseInt(el.innerText);
  if(!isNaN(val)){
    data[i].ch = val;
    data[i].lastUpdate = getToday();
    save();
  }
}

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
